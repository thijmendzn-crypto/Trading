<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signal Desk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07090f;
      --surface:   #0d1117;
      --surface2:  #161b24;
      --surface3:  #1c2333;
      --border:    #21293a;
      --border2:   #2d3a50;
      --text:      #cdd9e5;
      --text2:     #8b949e;
      --text3:     #545d68;
      --green:     #3fb950;
      --green-dim: rgba(63,185,80,0.1);
      --red:       #f85149;
      --red-dim:   rgba(248,81,73,0.1);
      --blue:      #58a6ff;
      --blue-dim:  rgba(88,166,255,0.08);
      --yellow:    #d29922;
      --yellow-dim:rgba(210,153,34,0.1);
      --purple:    #bc8cff;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 48px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 26px;
      height: 26px;
      background: var(--blue);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark svg { width: 14px; height: 14px; fill: #fff; }

    .logo-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.2px;
    }

    .header-center {
      display: flex;
      gap: 2px;
    }

    .tab {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      background: none;
      font-family: inherit;
    }

    .tab:hover { background: var(--surface2); color: var(--text); }
    .tab.active { background: var(--surface3); color: var(--text); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .pulse {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 0 rgba(63,185,80,0.4);
      animation: ping 2s infinite;
    }

    @keyframes ping {
      0%, 100% { box-shadow: 0 0 0 0 rgba(63,185,80,0.4); }
      50%       { box-shadow: 0 0 0 5px rgba(63,185,80,0); }
    }

    .status-label {
      font-size: 11px;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .scan-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }

    .scan-btn:hover { background: var(--border); }
    .scan-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .scan-btn svg { width: 12px; height: 12px; }

    /* ── Ticker bar ── */
    .ticker {
      display: flex;
      gap: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      flex-shrink: 0;
    }

    .ticker::-webkit-scrollbar { display: none; }

    .ticker-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      border-right: 1px solid var(--border);
      white-space: nowrap;
      min-width: 180px;
    }

    .ticker-symbol {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    .ticker-price {
      font-size: 13px;
      font-weight: 500;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
    }

    .ticker-meta {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .ticker-detail {
      font-size: 10px;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace;
    }

    .tag {
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .tag-bull  { background: var(--green-dim); color: var(--green); }
    .tag-bear  { background: var(--red-dim);   color: var(--red); }
    .tag-neut  { background: var(--surface3);  color: var(--text2); }
    .tag-trend { background: var(--blue-dim);  color: var(--blue); }
    .tag-range { background: var(--yellow-dim);color: var(--yellow); }
    .tag-vol   { background: var(--red-dim);   color: var(--red); }

    /* ── Main layout ── */
    .main {
      display: grid;
      grid-template-columns: 1fr 380px;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left panel ── */
    .left {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .panel-action {
      font-size: 11px;
      color: var(--blue);
      cursor: pointer;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px;
    }

    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* ── Signal cards ── */
    .signal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .signal-card:hover { border-color: var(--border2); }

    .signal-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .signal-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .direction-pill {
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .direction-pill.long  { background: var(--green-dim); color: var(--green); }
    .direction-pill.short { background: var(--red-dim);   color: var(--red); }

    .signal-asset {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .signal-time {
      font-size: 10px;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace;
    }

    .signal-score-block {
      text-align: right;
    }

    .score-number {
      font-size: 20px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      line-height: 1;
    }

    .score-label {
      font-size: 9px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    .score-bar {
      width: 60px;
      height: 3px;
      background: var(--surface3);
      border-radius: 2px;
      margin-top: 4px;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--blue);
    }

    /* Price grid */
    .price-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }

    .price-cell {
      padding: 10px 16px;
      border-right: 1px solid var(--border);
    }

    .price-cell:last-child { border-right: none; }

    .price-label {
      font-size: 9px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .price-value {
      font-size: 13px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }

    .price-value.entry  { color: var(--text); }
    .price-value.stop   { color: var(--red); }
    .price-value.tp     { color: var(--green); }
    .price-value.rr     { color: var(--blue); }

    /* Signal footer */
    .signal-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .confluence-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      flex: 1;
    }

    .conf-chip {
      padding: 2px 7px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 3px;
      font-size: 10px;
      color: var(--text2);
    }

    .signal-meta-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      white-space: nowrap;
    }

    .signal-regime {
      font-size: 10px;
      color: var(--text3);
    }

    .signal-conf-pct {
      font-size: 11px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text2);
    }

    /* Reasoning */
    .signal-reasoning {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text2);
      line-height: 1.6;
      background: var(--surface2);
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 8px;
      color: var(--text3);
      padding: 40px;
      text-align: center;
    }

    .empty-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }

    .empty-icon svg { width: 20px; height: 20px; stroke: var(--text3); fill: none; }
    .empty-title { font-size: 13px; font-weight: 500; color: var(--text2); }
    .empty-sub { font-size: 12px; }

    /* ── Right panel ── */
    .right {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border-bottom: 1px solid var(--border);
    }

    .stat-cell {
      padding: 14px 16px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .stat-cell:nth-child(2n) { border-right: none; }
    .stat-cell:nth-last-child(-n+2) { border-bottom: none; }

    .stat-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    .stat-val {
      font-size: 20px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      line-height: 1;
    }

    .stat-sub {
      font-size: 10px;
      color: var(--text3);
      margin-top: 3px;
    }

    /* Market detail */
    .market-section {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    .market-section::-webkit-scrollbar { width: 4px; }
    .market-section::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .market-row {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .market-row-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .market-symbol-name {
      font-size: 13px;
      font-weight: 600;
    }

    .market-price {
      font-size: 14px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }

    .market-indicators {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .ind-cell {
      background: var(--surface2);
      border-radius: 4px;
      padding: 5px 8px;
    }

    .ind-label {
      font-size: 9px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 2px;
    }

    .ind-val {
      font-size: 12px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }

    .green { color: var(--green); }
    .red   { color: var(--red); }
    .blue  { color: var(--blue); }
    .muted { color: var(--text2); }
    .dim   { color: var(--text3); }

    /* Divider label */
    .section-divider {
      padding: 6px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    @media (max-width: 800px) {
      .main { grid-template-columns: 1fr; }
      .right { display: none; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 16 16"><path d="M2 12 L8 2 L14 12 Z"/></svg>
      </div>
      <span class="logo-name">Signal Desk</span>
    </div>

    <div class="header-center">
      <button class="tab active">Signals</button>
      <button class="tab">Market</button>
      <button class="tab">Journal</button>
    </div>

    <div class="header-right">
      <div class="status-label">
        <div class="pulse" id="pulse"></div>
        <span id="status-text">Connecting</span>
      </div>
      <button class="scan-btn" id="scan-btn" onclick="triggerScan()">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 6A4 4 0 1 1 6 2"/><path d="M10 2v4H6"/></svg>
        Scan now
      </button>
    </div>
  </header>

  <!-- Ticker -->
  <div class="ticker" id="ticker">
    <div class="ticker-item"><span class="ticker-symbol dim">Loading...</span></div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Left: Signals -->
    <div class="left">
      <div class="panel-header">
        <span class="panel-title">Active Signals</span>
        <span class="panel-action" id="last-scan-label"></span>
      </div>
      <div class="panel-body" id="signals-panel">
        <div class="empty-state">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <div class="empty-title">No signals yet</div>
          <div class="empty-sub">Click "Scan now" or wait for the next scheduled scan</div>
        </div>
      </div>
    </div>

    <!-- Right: Stats + Market -->
    <div class="right">

      <!-- Stats -->
      <div class="section-divider">Performance</div>
      <div class="stats-grid">
        <div class="stat-cell">
          <div class="stat-label">Signals today</div>
          <div class="stat-val blue" id="stat-signals">—</div>
          <div class="stat-sub">approved</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Win rate</div>
          <div class="stat-val green" id="stat-wr">—</div>
          <div class="stat-sub" id="stat-trades">no trades yet</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Total P&L</div>
          <div class="stat-val" id="stat-pnl">—</div>
          <div class="stat-sub" id="stat-exp"></div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Max drawdown</div>
          <div class="stat-val" id="stat-dd">—</div>
          <div class="stat-sub">peak to trough</div>
        </div>
      </div>

      <!-- Market -->
      <div class="section-divider">Market Overview</div>
      <div class="market-section" id="market-panel">
        <div class="empty-state" style="height:auto;padding:24px">
          <span class="dim">Loading market data...</span>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const fmt = (n, d=2) => Number(n).toLocaleString('en-US', {minimumFractionDigits:d, maximumFractionDigits:d});
const fmtSmall = n => Number(n) > 1000 ? fmt(n, 2) : fmt(n, 4);

async function fetchStatus() {
  try {
    const d = await fetch('/api/status').then(r => r.json());
    document.getElementById('status-text').textContent = d.scanner_active ? 'Live' : 'Connected';
    if (d.last_scan) {
      const t = new Date(d.last_scan);
      document.getElementById('last-scan-label').textContent =
        'Last scan ' + t.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
    }
    document.getElementById('stat-signals').textContent = d.total_signals ?? '0';
  } catch {}
}

async function fetchMarket() {
  try {
    const data = await fetch('/api/market').then(r => r.json());

    // Ticker
    const tickerHtml = data.map(a => {
      if (a.error) return '';
      const sym = a.symbol.replace('USDT','');
      const trendTag = a.trend === 'BULLISH'
        ? '<span class="tag tag-bull">Bull</span>'
        : a.trend === 'BEARISH'
        ? '<span class="tag tag-bear">Bear</span>'
        : '<span class="tag tag-neut">Neutral</span>';
      const regTag = a.regime === 'TRENDING'
        ? '<span class="tag tag-trend">Trending</span>'
        : a.regime === 'RANGING'
        ? '<span class="tag tag-range">Range</span>'
        : '<span class="tag tag-vol">Volatile</span>';

      return `<div class="ticker-item">
        <div class="ticker-meta">
          <div style="display:flex;align-items:center;gap:6px">
            <span class="ticker-symbol">${sym}</span>
            ${trendTag}
            ${regTag}
          </div>
          <span class="ticker-detail" style="margin-top:2px">RSI ${a.rsi} · ADX ${a.adx} · Vol ${a.volume_ratio}x</span>
        </div>
        <span class="ticker-price">$${fmtSmall(a.current_price)}</span>
      </div>`;
    }).join('');
    document.getElementById('ticker').innerHTML = tickerHtml || '<div class="ticker-item dim">No data</div>';

    // Market panel
    const marketHtml = data.map(a => {
      if (a.error) return '';
      const sym = a.symbol.replace('USDT','');
      const priceColor = a.trend === 'BULLISH' ? 'green' : a.trend === 'BEARISH' ? 'red' : '';
      const rsiColor = a.rsi < 35 ? 'green' : a.rsi > 65 ? 'red' : 'muted';
      const support = a.key_support?.slice(-1)[0];
      const resist  = a.key_resistance?.[0];

      return `<div class="market-row">
        <div class="market-row-top">
          <span class="market-symbol-name">${sym} <span class="dim" style="font-weight:400;font-size:11px">/ USDT</span></span>
          <span class="market-price ${priceColor}">$${fmtSmall(a.current_price)}</span>
        </div>
        <div class="market-indicators">
          <div class="ind-cell">
            <div class="ind-label">Trend</div>
            <div class="ind-val ${priceColor}">${a.trend}</div>
          </div>
          <div class="ind-cell">
            <div class="ind-label">Regime</div>
            <div class="ind-val ${a.regime==='TRENDING'?'blue':a.regime==='VOLATILE'?'red':'muted'}">${a.regime}</div>
          </div>
          <div class="ind-cell">
            <div class="ind-label">Structure</div>
            <div class="ind-val muted">${a.market_structure}</div>
          </div>
          <div class="ind-cell">
            <div class="ind-label">ADX</div>
            <div class="ind-val ${a.adx>25?'blue':'muted'}">${a.adx}</div>
          </div>
          <div class="ind-cell">
            <div class="ind-label">RSI</div>
            <div class="ind-val ${rsiColor}">${a.rsi}</div>
          </div>
          <div class="ind-cell">
            <div class="ind-label">Volume</div>
            <div class="ind-val ${a.volume_ratio>1.2?'green':a.volume_ratio<0.7?'red':'muted'}">${a.volume_ratio}x</div>
          </div>
          ${support ? `<div class="ind-cell">
            <div class="ind-label">Support</div>
            <div class="ind-val green" style="font-size:11px">$${fmtSmall(support)}</div>
          </div>` : ''}
          ${resist ? `<div class="ind-cell">
            <div class="ind-label">Resistance</div>
            <div class="ind-val red" style="font-size:11px">$${fmtSmall(resist)}</div>
          </div>` : ''}
          <div class="ind-cell">
            <div class="ind-label">OBs / FVGs</div>
            <div class="ind-val muted">${a.order_blocks?.length ?? 0} / ${a.fair_value_gaps?.length ?? 0}</div>
          </div>
        </div>
      </div>`;
    }).join('');

    document.getElementById('market-panel').innerHTML = marketHtml || '<div class="empty-state"><span class="dim">No data</span></div>';
  } catch(e) {
    document.getElementById('market-panel').innerHTML = `<div class="empty-state"><span class="dim">Error: ${e.message}</span></div>`;
  }
}

async function fetchSignals() {
  try {
    const signals = await fetch('/api/signals?approved_only=true&limit=20').then(r => r.json());
    if (!signals.length) return;

    const html = signals.map(s => {
      const dir = s.direction.toLowerCase();
      const tps = s.take_profit || [];
      const score = s.score || 0;
      const scoreColor = score >= 80 ? '#3fb950' : score >= 70 ? '#58a6ff' : '#d29922';
      const time = s.created_at ? new Date(s.created_at).toLocaleString('en-US', {
        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      }) : '';

      return `<div class="signal-card">
        <div class="signal-card-top">
          <div class="signal-left">
            <span class="direction-pill ${dir}">${s.direction}</span>
            <div>
              <div class="signal-asset">${s.asset.replace('USDT', '')} <span class="dim" style="font-size:11px;font-weight:400">/ USDT</span></div>
              <div class="signal-time">${time} · ${s.timeframe?.toUpperCase()} · ${s.market_regime}</div>
            </div>
          </div>
          <div class="signal-score-block">
            <div class="score-number" style="color:${scoreColor}">${score.toFixed(0)}</div>
            <div class="score-label">Score</div>
            <div class="score-bar"><div class="score-fill" style="width:${score}%;background:${scoreColor}"></div></div>
          </div>
        </div>

        <div class="price-grid">
          <div class="price-cell">
            <div class="price-label">Entry</div>
            <div class="price-value entry">$${fmtSmall(s.entry)}</div>
          </div>
          <div class="price-cell">
            <div class="price-label">Stop Loss</div>
            <div class="price-value stop">$${fmtSmall(s.stop_loss)}</div>
          </div>
          <div class="price-cell">
            <div class="price-label">Take Profit</div>
            <div class="price-value tp">$${tps[0] ? fmtSmall(tps[0]) : '—'}</div>
          </div>
          <div class="price-cell">
            <div class="price-label">R/R · Conf.</div>
            <div class="price-value rr">${s.risk_reward}:1 · ${(s.confidence*100).toFixed(0)}%</div>
          </div>
        </div>

        <div class="signal-footer">
          <div class="confluence-list">
            ${(s.confluence_factors||[]).map(f => `<span class="conf-chip">${f}</span>`).join('')}
          </div>
        </div>

        ${s.reasoning ? `<div class="signal-reasoning">${s.reasoning.substring(0,280)}${s.reasoning.length>280?'…':''}</div>` : ''}
      </div>`;
    }).join('');

    document.getElementById('signals-panel').innerHTML = html;
  } catch(e) {}
}

async function fetchJournal() {
  try {
    const s = await fetch('/api/journal/stats').then(r => r.json());
    if (!s.total_trades) return;

    const wrEl = document.getElementById('stat-wr');
    wrEl.textContent = (s.win_rate * 100).toFixed(1) + '%';
    document.getElementById('stat-trades').textContent = s.total_trades + ' trades';

    const pnl = s.total_r ?? 0;
    const pnlEl = document.getElementById('stat-pnl');
    pnlEl.textContent = (pnl >= 0 ? '+' : '') + pnl.toFixed(2) + 'R';
    pnlEl.className = 'stat-val ' + (pnl >= 0 ? 'green' : 'red');

    const dd = s.max_drawdown ?? 0;
    const ddEl = document.getElementById('stat-dd');
    ddEl.textContent = (dd * 100).toFixed(1) + '%';
    ddEl.className = 'stat-val ' + (dd > 0.1 ? 'red' : 'muted');

    document.getElementById('stat-exp').textContent = 'Expect. ' + (s.expectancy ?? 0).toFixed(3) + 'R';
  } catch {}
}

async function triggerScan() {
  const btn = document.getElementById('scan-btn');
  btn.disabled = true;
  btn.innerHTML = `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" style="animation:spin 1s linear infinite"><path d="M10 6A4 4 0 1 1 6 2"/></svg> Scanning…`;

  const style = document.createElement('style');
  style.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
  document.head.appendChild(style);

  try {
    await fetch('/api/scan', { method: 'POST' });
    await Promise.all([fetchStatus(), fetchSignals(), fetchMarket()]);
    btn.innerHTML = `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="2,6 5,9 10,3"/></svg> Done`;
    setTimeout(() => {
      btn.innerHTML = `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 6A4 4 0 1 1 6 2"/><path d="M10 2v4H6"/></svg> Scan now`;
      btn.disabled = false;
    }, 2500);
  } catch {
    btn.innerHTML = 'Error';
    btn.disabled = false;
  }
}

async function refresh() {
  await Promise.all([fetchStatus(), fetchMarket(), fetchSignals(), fetchJournal()]);
}

refresh();
setInterval(refresh, 60000);
</script>
</body>
</html>
